name: CI
on:
  push:
    branches: [main, develop, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        suite: [root, lab1, lab2]
    env:
      SUITE_DIR: ${{ matrix.suite == 'root' && '.' || format('workspace/{0}', matrix.suite == 'lab1' && 'lab1-material-papel-mache-grafite' || 'lab2-gerador-eolico-savonius') }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy scipy pandas matplotlib jsonschema pyyaml ruff
      - name: Run root smoke
        if: matrix.suite == 'root'
        run: pytest tests/ -p no:cacheprovider -ra
      - name: Run lab1 suite
        if: matrix.suite == 'lab1'
        run: |
          cd workspace/lab1-material-papel-mache-grafite
          pytest tests/ -p no:cacheprovider -ra
      - name: Run lab2 suite
        if: matrix.suite == 'lab2'
        run: |
          cd workspace/lab2-gerador-eolico-savonius
          pytest tests/ -p no:cacheprovider -ra
      - name: Lint (non-blocking)
        run: |
          ruff check . --exit-zero || true
