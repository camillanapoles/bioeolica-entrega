name: GitNexus Impact
# M0/M4: análise de impacto GitNexus antes de editar símbolos.
# Roda em PRs que tocam .py. Emite comentário com blast radius.

on:
  pull_request:
    paths:
      - "**.py"
      - "workspace/**/*.py"

permissions:
  contents: read
  pull-requests: write

jobs:
  impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Set up Node
        uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install GitNexus
        run: npm i -g gitnexus 2>/dev/null || npm i gitnexus --no-save
      - name: Analyze (re-index if stale)
        run: |
          node .gitnexus/run.cjs analyze 2>/dev/null || npx gitnexus analyze || echo "::warning::index indisponível, CI segue sem impacto"
      - name: Detect changes vs base
        id: det
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          {
            echo "## 🔍 GitNexus detect_changes (M0/M4)"
            echo ""
            npx gitnexus detect-changes --base "$BASE" --head "$HEAD" 2>/dev/null \
              || echo "_detect_changes indisponível neste runner; revisar impacto localmente._"
          } > impact_report.md
          cat impact_report.md
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('impact_report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.slice(0, 60000)
            });
