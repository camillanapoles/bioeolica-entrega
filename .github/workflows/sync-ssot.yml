# SSOT → webapp continuous-integration sync (Mandato B.0 / "mesma DB").
#
# Whenever the project Single Source of Truth (constants.json) changes, this
# workflow regenerates the webapp-consumable manifest (webapp/_seed_from_ssot.json)
# and auto-commits it back. If constants.json is missing or invalid JSON, the
# script exits non-zero and the workflow FAILS — making the SSOT a hard CI gate.
name: sync-ssot

on:
  push:
    paths:
      - "workspace/lab1-material-papel-mache-grafite/config/constants.json"
      - "scripts/ssot_to_webapp_seed.py"
      - ".github/workflows/sync-ssot.yml"
    branches: [main, "feat/**"]
  pull_request:
    paths:
      - "workspace/lab1-material-papel-mache-grafite/config/constants.json"
      - "scripts/ssot_to_webapp_seed.py"
  workflow_dispatch:

permissions:
  contents: write   # required to auto-commit the regenerated seed

concurrency:
  group: sync-ssot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # need write access for the auto-commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate SSOT + regenerate seed (fails CI on invalid JSON)
        run: |
          echo "::group::SSOT → webapp seed"
          python3 scripts/ssot_to_webapp_seed.py
          echo "::endgroup::"
          # Re-run in --check mode as a hard gate: if the on-disk file would
          # still change, the script above did not converge (should never happen).
          python3 scripts/ssot_to_webapp_seed.py --check

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- webapp/_seed_from_ssot.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to seed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Seed changed — will commit."
            git diff --stat -- webapp/_seed_from_ssot.json
          fi

      - name: Commit regenerated seed
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add webapp/_seed_from_ssot.json
          git commit -m "chore(ssot): auto-sync webapp seed from constants.json [skip ci]

          Regenerated by .github/workflows/sync-ssot.yml (Mandato B.0).
          Source: workspace/lab1-material-papel-mache-grafite/config/constants.json
          Generated by: scripts/ssot_to_webapp_seed.py"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### SSOT sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "✅ Seed regenerated and committed." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "⚠️ Seed would change — review in PR (no auto-commit on PR events)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "✅ Seed already in sync with SSOT." >> "$GITHUB_STEP_SUMMARY"
          fi
