<!DOCTYPE html>
<html><head>
<style>body{margin:0;overflow:hidden;font-family:Arial,sans-serif}
#info{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);color:#fff;padding:8px 14px;border-radius:4px;z-index:100;font-size:13px}
#controls{position:absolute;top:10px;right:10px;z-index:100;display:flex;flex-direction:column;gap:6px}
#controls select,#controls button{background:rgba(30,30,60,0.85);color:#fff;border:1px solid #555;padding:5px 10px;border-radius:3px;cursor:pointer;font-size:12px}
#controls button:hover{background:#444}</style></head><body>
<div id="info">🔬 AI Assist CAD — Rotacione/Zoom com mouse | Scroll para zoom</div>
<div id="controls">
  <select id="domainSelect"><option>von Mises (MPa)</option><option>Temperatura (°C)</option><option>Deslocamento (mm)</option></select>
  <button onclick="toggleCut()">✂ Corte Transversal</button>
  <button onclick="resetView()">⟲ Resetar Vista</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x111122);
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000); camera.position.set(5,4,8);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(window.innerWidth,window.innerHeight); document.body.appendChild(renderer.domElement);
const controls=new (function(){var c=this; c.target=new THREE.Vector3(); c.enableDamping=true; c.dampingFactor=0.08; c.autoRotate=false; c.update=function(){}})();
scene.add(new THREE.GridHelper(10,10,0x444466,0x333355));
scene.add(new THREE.AxesHelper(3));
const geo=new THREE.CylinderGeometry(1.5,1.5,2,32,1,true);
const colors=[]; for(let i=0;i<geo.attributes.position.count;i++){const h=(geo.attributes.position.getY(i)+1)/2; colors.push(h,0,1-h);}
geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
const mat=new THREE.MeshPhongMaterial({vertexColors:true,side:THREE.DoubleSide,transparent:true,opacity:0.85});
scene.add(new THREE.Mesh(geo,mat));
scene.add(new THREE.DirectionalLight(0xffffff,1)); scene.add(new THREE.AmbientLight(0x404060));
const btn=document.getElementById('domainSelect'); btn.onchange=function(){const val=parseInt(this.value)||0; document.querySelector('#info').innerHTML='🔬 Modo: '+this.options[this.selectedIndex].text;};
function toggleCut(){scene.children.forEach(c=>{if(c.isMesh){c.material.clippingPlanes=c.material.clippingPlanes?null:[new THREE.Plane(new THREE.Vector3(0,0,1),0)];}});}
function resetView(){camera.position.set(5,4,8); camera.lookAt(0,0,0);}
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);} animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script></body></html>
